<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeCalc Rural</title>

<style>

body{
margin:0;
font-family:Arial;
background:#4e342e;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:900px;
padding:40px;
}

.titulo{
font-size:46px;
margin-bottom:40px;
}

.texto{
font-size:32px;
line-height:1.4;
}

.botao{
margin-top:50px;
padding:18px 40px;
font-size:26px;
border:none;
border-radius:10px;
background:#ffca28;
cursor:pointer;
}

.microfone{
margin-top:60px;
width:140px;
height:140px;
border-radius:50%;
border:none;
font-size:55px;
background:#2e7d32;
color:white;
cursor:pointer;
}

.status{
margin-top:30px;
font-size:22px;
}

</style>

</head>

<body>

<div class="container">

<div class="titulo">☕ CafeCalc Rural</div>

<div id="texto" class="texto"></div>

<button id="continuar" class="botao">Começar</button>

<button id="mic" class="microfone" style="display:none">🎤</button>

<div id="status" class="status"></div>

</div>

<script>

let precoCafe = 920

let passo = -1

let dados = {}

let vozesCarregadas = []

speechSynthesis.onvoiceschanged = () => {
vozesCarregadas = speechSynthesis.getVoices()
}

let perguntas = [

"Quantas sacas de café você colheu?",

"Quantos hectares de café você tem?",

"Quanto você gastou com mão de obra?",

"Quanto você gastou com adubo?",

"Quanto você gastou com agrotóxicos?",

"Quanto você gastou com máquinas ou trator?",

"Quanto você gastou com transporte?"

]

let campos = [

"sacas",
"hectares",
"mao",
"adubo",
"agro",
"trator",
"transporte"

]

function falar(texto){

if(!('speechSynthesis' in window)) return

speechSynthesis.cancel()

let msg = new SpeechSynthesisUtterance()

msg.text = texto
msg.lang = "pt-BR"
msg.rate = 0.9
msg.pitch = 1

let voz = vozesCarregadas.find(v => v.lang.includes("pt"))

if(voz){
msg.voice = voz
}

speechSynthesis.speak(msg)

}

function mostrarInicio(){

let texto =

"O preço médio da saca de café hoje é "+
precoCafe+
" reais. "+
"Este assistente vai ajudar você a calcular o lucro aproximado da sua safra."

document.getElementById("texto").innerText = texto

}

function proximaPergunta(){

passo++

if(passo >= perguntas.length){

calcular()

return

}

document.getElementById("continuar").style.display="none"

document.getElementById("mic").style.display="block"

let pergunta = perguntas[passo]

document.getElementById("texto").innerText = pergunta

falar(pergunta)

}

document.getElementById("continuar").onclick = function(){

speechSynthesis.resume()

if(passo === -1){

let texto = document.getElementById("texto").innerText

falar(texto)

passo = -1

proximaPergunta()

return

}

proximaPergunta()

}

document.getElementById("mic").onclick = function(){

let SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition

if(!SpeechRecognition){

document.getElementById("status").innerText =
"Navegador não suporta reconhecimento de voz"

return

}

let recognition = new SpeechRecognition()

recognition.lang = "pt-BR"

recognition.start()

document.getElementById("status").innerText="🎤 Ouvindo..."

recognition.onresult = function(e){

let texto = e.results[0][0].transcript

let numero = texto.replace(/\D/g,'')

dados[campos[passo]] = Number(numero)

document.getElementById("status").innerText="Resposta registrada"

document.getElementById("mic").style.display="none"

document.getElementById("continuar").style.display="inline-block"

document.getElementById("texto").innerText="Resposta salva. Clique continuar."

}

recognition.onerror = function(){

document.getElementById("status").innerText="Erro ao usar microfone"

}

}

function calcular(){

let custo =

dados.mao +
dados.adubo +
dados.agro +
dados.trator +
dados.transporte

let receita = dados.sacas * precoCafe

let lucro = receita - custo

let minimo = custo / dados.sacas

let resultado =

"Resultado aproximado da safra. "+
"O lucro aproximado é "+
lucro.toFixed(2)+
" reais. "+
"O preço mínimo da saca para não ter prejuízo é "+
minimo.toFixed(2)+
" reais. "+
"Esses valores são apenas estimativas para ajudar na análise da produção."

document.getElementById("texto").innerText = resultado

document.getElementById("mic").style.display="none"

document.getElementById("continuar").style.display="none"

falar(resultado)

}

mostrarInicio()

</script>

</body>

</html>
