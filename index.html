<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeCalc Rural</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url("1773857581531.png");

background-size:cover;
background-position:center;
}

.container{
width:90%;
max-width:900px;
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:20px;
}

.titulo{
font-size:48px;
margin-bottom:20px;
}

.texto{
font-size:30px;
margin-bottom:30px;
}

input{
width:70%;
padding:20px;
font-size:28px;
border-radius:10px;
border:none;
text-align:center;
}

.botao{
margin-top:20px;
padding:18px 40px;
font-size:26px;
border:none;
border-radius:10px;
background:#ffca28;
cursor:pointer;
}

.start{
font-size:40px;
border-radius:50%;
animation:pulsar 1.5s infinite;
}

@keyframes pulsar{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.audio{
position:fixed;
top:20px;
right:20px;
font-size:28px;
background:#2e7d32;
border:none;
border-radius:50%;
padding:15px;
cursor:pointer;
}

.barra-container{
width:100%;
height:40px;
background:#ddd;
border-radius:20px;
margin-top:20px;
overflow:hidden;
display:none;
}

.barra{
height:100%;
width:0%;
transition:1s;
}

.lucro{ background:#4caf50; }
.prejuizo{ background:#f44336; }

</style>
</head>

<body>

<button class="audio" onclick="repetir()">🔊</button>

<div class="container">

<div class="titulo">☕ CafeCalc</div>

<div id="texto" class="texto"></div>

<input id="entrada" type="number" placeholder="Digite o número">

<div class="barra-container" id="barraBox">
<div id="barra" class="barra"></div>
</div>

<br>

<button id="continuar" class="botao start">▶</button>

</div>

<script>

let precoCafe = 1966
let passo = -1
let dados = {}
let textoAtual = ""

let perguntas = [
"Quantas sacas você colheu?",
"Quantos hectares você tem?",
"Quanto gastou com mão de obra?",
"Quanto gastou com adubo?",
"Quanto gastou com veneno?",
"Quanto gastou com trator?",
"Quanto gastou com transporte?"
]

let campos = [
"sacas","hectares","mao","adubo","agro","trator","transporte"
]

function falar(texto){
if(!('speechSynthesis' in window)) return
speechSynthesis.cancel()
let msg = new SpeechSynthesisUtterance(texto)
msg.lang="pt-BR"
msg.rate=0.9
speechSynthesis.speak(msg)
}

function repetir(){
falar(textoAtual)
}

function somFazenda(){
let audio = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b2c33.mp3")
audio.volume=0.3
audio.play()
}

function mostrarInicio(){

textoAtual =
"O preço do café hoje é " + precoCafe +
" reais. Vou te ajudar a ver seu lucro."

document.getElementById("texto").innerText = textoAtual
document.getElementById("entrada").style.display="none"

falar(textoAtual)

}

function proximaPergunta(){

passo++

if(passo >= perguntas.length){
calcular()
return
}

document.getElementById("entrada").value=""
document.getElementById("entrada").style.display="inline"

textoAtual = perguntas[passo]

document.getElementById("texto").innerText = textoAtual

falar(textoAtual)

}

document.getElementById("continuar").onclick=function(){

if(passo == -1){
proximaPergunta()
return
}

let valor = document.getElementById("entrada").value

if(valor == ""){
alert("Digite um número")
return
}

dados[campos[passo]] = Number(valor)

proximaPergunta()

}

function calcular(){

let custo =
dados.mao + dados.adubo + dados.agro + dados.trator + dados.transporte

let receita = dados.sacas * precoCafe
let lucro = receita - custo
let minimo = custo / dados.sacas

let barra = document.getElementById("barra")
let box = document.getElementById("barraBox")

box.style.display="block"

let intensidade = Math.min(Math.abs(lucro)/receita*100,100)
barra.style.width = intensidade+"%"

if(lucro>0){
barra.className="barra lucro"
}else{
barra.className="barra prejuizo"
}

/* TEXTO BASE */
textoAtual =
"Você produziu " + dados.sacas + " sacas. " +
"Você gastou " + custo.toFixed(0) + " reais. " +
"Você recebeu " + receita.toFixed(0) + " reais. "

if(lucro>0){
textoAtual += "Você teve lucro de " + lucro.toFixed(0) + " reais. "
}else{
textoAtual += "Você teve prejuízo de " + Math.abs(lucro).toFixed(0) + " reais. "
}

textoAtual +=
"O preço mínimo da saca é " + minimo.toFixed(0) + " reais. "

/* 🤖 ASSISTENTE INTELIGENTE */
let produtividade = dados.sacas / dados.hectares

if(produtividade < 20){
textoAtual += " Sua produção está baixa. Tente melhorar o cuidado com a lavoura. "
}

if(produtividade > 40){
textoAtual += " Sua produção está muito boa. Continue assim. "
}

if(dados.mao > custo * 0.4){
textoAtual += " Você está gastando muito com mão de obra. "
}

if(dados.adubo > custo * 0.3){
textoAtual += " O gasto com adubo está alto. "
}

if(minimo > precoCafe){
textoAtual += " Cuidado. Se o preço cair, você pode ter prejuízo. "
}

if(lucro > 0){
textoAtual += " Sua produção está dando lucro. "
}else{
textoAtual += " É importante reduzir custos para melhorar. "
}

textoAtual += " Esses valores são apenas uma estimativa."

document.getElementById("entrada").style.display="none"
document.getElementById("continuar").style.display="none"

document.getElementById("texto").innerText = textoAtual

somFazenda()
falar(textoAtual)

}

mostrarInicio()

</script>

</body>
</html>
