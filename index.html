<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeCalc Rural</title>

<style>

body{
margin:0;
font-family:Arial;
background:#4e342e;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{

width:100%;
max-width:900px;
text-align:center;
padding:40px;

}

.titulo{

font-size:48px;
margin-bottom:40px;

}

.texto{

font-size:34px;
line-height:1.4;

}

.botao{

margin-top:50px;
padding:20px 40px;
font-size:28px;
border:none;
border-radius:12px;
background:#ffca28;
color:black;
cursor:pointer;

}

.microfone{

margin-top:60px;
width:150px;
height:150px;
border-radius:50%;
border:none;
font-size:60px;
background:#2e7d32;
color:white;
cursor:pointer;

}

.status{

margin-top:30px;
font-size:24px;

}

</style>

</head>

<body>

<div class="app">

<div class="titulo">☕ CafeCalc Rural</div>

<div id="texto" class="texto"></div>

<button id="continuar" class="botao">
Começar
</button>

<button id="mic" class="microfone" style="display:none">
🎤
</button>

<div id="status" class="status"></div>

</div>

<script>

let precoCafe = 920

let passo = 0

let dados = {}

let perguntas = [

"Quantas sacas de café você colheu?",

"Quantos hectares de café você tem?",

"Quanto você gastou com mão de obra?",

"Quanto você gastou com adubo?",

"Quanto você gastou com agrotóxicos?",

"Quanto você gastou com máquinas ou trator?",

"Quanto você gastou com transporte?"

]

let campos = [

"sacas",
"hectares",
"mao",
"adubo",
"agro",
"trator",
"transporte"

]

function falar(texto){

if(!('speechSynthesis' in window)){
return
}

speechSynthesis.cancel()

let msg = new SpeechSynthesisUtterance(texto)

msg.lang = "pt-BR"
msg.rate = 0.95
msg.pitch = 1

let vozes = speechSynthesis.getVoices()

let vozBR = vozes.find(v => v.lang === "pt-BR")

if(vozBR){
msg.voice = vozBR
}

speechSynthesis.speak(msg)

}

function iniciar(){

let mensagem =

"O preço médio da saca de café hoje é " +
precoCafe +
" reais. " +
"Este assistente vai ajudar você a calcular o lucro aproximado da sua safra."

document.getElementById("texto").innerText = mensagem

falar(mensagem)

document.getElementById("continuar").innerText = "Continuar"

}

document.getElementById("continuar").onclick = function(){

if(passo === 0){

ativarMicrofone()

}

mostrarPergunta()

}

async function ativarMicrofone(){

try{

await navigator.mediaDevices.getUserMedia({audio:true})

document.getElementById("status").innerText = "Microfone ativado"

}catch(e){

document.getElementById("status").innerText = "Erro ao ativar microfone"

}

}

function mostrarPergunta(){

document.getElementById("continuar").style.display = "none"

document.getElementById("mic").style.display = "block"

let pergunta = perguntas[passo]

document.getElementById("texto").innerText = pergunta

falar(pergunta)

}

document.getElementById("mic").onclick = function(){

let SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition

if(!SpeechRecognition){

document.getElementById("status").innerText =
"Navegador não suporta reconhecimento de voz"

return

}

let recognition = new SpeechRecognition()

recognition.lang = "pt-BR"

recognition.start()

document.getElementById("status").innerText = "🎤 Ouvindo..."

recognition.onresult = function(e){

let texto = e.results[0][0].transcript

let numero = texto.replace(/\D/g,'')

dados[campos[passo]] = Number(numero)

document.getElementById("status").innerText = "Resposta registrada"

passo++

document.getElementById("mic").style.display = "none"

if(passo < perguntas.length){

document.getElementById("texto").innerText =
"Resposta salva. Clique continuar."

document.getElementById("continuar").style.display = "block"

}else{

calcular()

}

}

recognition.onerror = function(){

document.getElementById("status").innerText =
"Erro ao usar microfone"

}

}

function calcular(){

let custo =

dados.mao +
dados.adubo +
dados.agro +
dados.trator +
dados.transporte

let receita = dados.sacas * precoCafe

let lucro = receita - custo

let minimo = custo / dados.sacas

let texto =

"Resultado aproximado da safra. " +
"O lucro aproximado é " +
lucro.toFixed(2) +
" reais. " +
"O preço mínimo da saca para não ter prejuízo é " +
minimo.toFixed(2) +
" reais. " +
"Estes valores são apenas estimativas para ajudar na análise da produção."

document.getElementById("texto").innerText = texto

falar(texto)

}

iniciar()

</script>

</body>

</html>
